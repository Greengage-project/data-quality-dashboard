<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><!DOCTYPE html>
        <html lang="en">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>STL Decomposition Plot</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
<div id="myPlot" style="width:100%;height:800px;"></div>

<script>
    // Simple Moving Average function
    function movingAverage(data, window) {
        const result = [];
        for (let i = 0; i < data.length - window + 1; i++) {
            const windowSlice = data.slice(i, i + window);
            const average = windowSlice.reduce((a, b) => a + b) / window;
            result.push(average);
        }
        return result;
    }

    // Simple STL-like decomposition
    function simpleSTL(data, seasonalPeriod, trendWindow) {
        // Step 1: Estimate trend using moving average
        const trendEstimate = movingAverage(data, trendWindow);

        // Step 2: Detrend the series
        const detrended = data.map((value, index) =>
            index < trendEstimate.length ? value - trendEstimate[index] : null
        ).filter(value => value !== null);

        // Step 3: Estimate seasonal component
        const seasonalEstimate = [];
        for (let i = 0; i < seasonalPeriod; i++) {
            const seasonalSlice = detrended.filter((_, index) => index % seasonalPeriod === i);
            const seasonalAverage = seasonalSlice.reduce((a, b) => a + b) / seasonalSlice.length;
            seasonalEstimate.push(seasonalAverage);
        }

        // Step 4: Compute full seasonal component and residuals
        const seasonal = [];
        const residual = [];
        for (let i = 0; i < data.length; i++) {
            const seasonalValue = seasonalEstimate[i % seasonalPeriod];
            seasonal.push(seasonalValue);
            residual.push(data[i] - (trendEstimate[i] || 0) - seasonalValue);
        }

        return {
            original: data,
            trend: trendEstimate,
            seasonal: seasonal,
            residual: residual
        };
    }

    // Example time series data
    const timeSeries = [23, 25, 28, 30, 32, 33, 35, 36, 37, 39, 40, 41,
        24, 26, 29, 31, 33, 34, 36, 37, 38, 40, 41, 42];

    // Perform STL decomposition
    const result = simpleSTL(timeSeries, 12, 7);

    // Create x-axis values (time points)
    const xValues = Array.from({length: timeSeries.length}, (_, i) => i + 1);

    // Create traces for each component
    const traces = [
        {x: xValues, y: result.original, type: 'scatter', mode: 'lines', name: 'Original'},
        {x: xValues, y: result.trend, type: 'scatter', mode: 'lines', name: 'Trend'},
        {x: xValues, y: result.seasonal, type: 'scatter', mode: 'lines', name: 'Seasonal'},
        {x: xValues, y: result.residual, type: 'scatter', mode: 'lines', name: 'Residual'}
    ];

    // Layout for subplots
    const layout = {
        title: 'STL Decomposition',
        height: 800,
        grid: {rows: 4, columns: 1, pattern: 'independent'},
        yaxis: {domain: [0.75, 1], title: 'Original'},
        yaxis2: {domain: [0.5, 0.75], title: 'Trend'},
        yaxis3: {domain: [0.25, 0.5], title: 'Seasonal'},
        yaxis4: {domain: [0, 0.25], title: 'Residual'}
    };

    // Create the plot
    Plotly.newPlot('myPlot', traces, layout);
</script>
</body>
</html>
</title>
